<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zekr Alrahman — ذكر الرحمن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@400;700&family=Aref+Ruqaa&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;height:100vh;overflow:hidden;color:#fff}
:root{
--bg:#050505;--neon1:#00D4FF;--neon2:#00FF88;--neon3:#B24BF3;--neon4:#FF0040;--neon5:#FFD700;
--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
}
/* Theme classes */
.theme-morning{--bg:#0A0E1A;--neon1:#00D4FF;--neon2:#00FF88}
.theme-evening{--bg:#0D0221;--neon1:#B24BF3;--neon2:#FF6B35}
.theme-sleep{--bg:#050505;--neon1:#FF0040;--neon2:#FFD700}

#app{height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
#app::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
background:radial-gradient(ellipse at 20% 15%,rgba(0,212,255,0.08),transparent 60%),
radial-gradient(ellipse at 80% 30%,rgba(0,255,136,0.06),transparent 60%),
radial-gradient(ellipse at 50% 80%,rgba(178,75,243,0.05),transparent 60%);pointer-events:none}

.header{text-align:center;padding:50px 20px 15px;flex-shrink:0;z-index:10}
.header h1{font-family:'Aref Ruqaa',serif;font-size:28px;color:var(--neon1);
text-shadow:0 0 10px var(--neon1),0 0 20px var(--neon1),0 0 40px var(--neon1)}
.header p{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px}

.content{flex:1;overflow-y:auto;padding:10px 16px 90px;z-index:10}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--neon1);border-radius:4px}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
padding:16px;margin-bottom:10px;backdrop-filter:blur(10px);transition:all 0.2s;cursor:pointer}
.card:hover{border-color:var(--neon1);box-shadow:0 0 15px rgba(0,212,255,0.15)}
.card h3{font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;color:var(--neon1);margin-bottom:6px}
.card p{font-family:'Amiri',serif;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.8}
.card .count{display:flex;align-items:center;gap:10px;margin-top:10px}
.card .bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.card .bar-fill{height:100%;background:var(--neon2);border-radius:2px;transition:width 0.3s}
.card .num{font-size:13px;color:var(--neon2);font-weight:700;min-width:60px;text-align:left}
.card .ref{font-size:10px;color:rgba(255,255,255,0.3);margin-top:6px}

/* Names grid */
.names-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.name-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
padding:12px 6px;text-align:center;cursor:pointer;transition:all 0.2s}
.name-card:hover{border-color:var(--neon1);box-shadow:0 0 10px rgba(0,212,255,0.2);transform:translateY(-2px)}
.name-card .name{font-family:'Aref Ruqaa',serif;font-size:18px;color:var(--neon1);
text-shadow:0 0 8px currentColor;margin-bottom:4px}
.name-card .meaning{font-size:9px;color:rgba(255,255,255,0.4);line-height:1.3}

/* Name detail */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);
z-index:100;display:none;justify-content:center;align-items:flex-start;padding:60px 20px;overflow-y:auto}
.detail-overlay.active{display:flex}
.detail-box{background:var(--bg);border:1px solid var(--neon1);border-radius:20px;
padding:30px;max-width:500px;width:100%;box-shadow:0 0 30px rgba(0,212,255,0.2)}
.detail-box .big-name{font-family:'Aref Ruqaa',serif;font-size:48px;text-align:center;
color:var(--neon1);text-shadow:0 0 20px currentColor;margin-bottom:10px}
.detail-box .meaning{font-size:14px;color:rgba(255,255,255,0.7);text-align:center;margin-bottom:20px}
.detail-box .desc{font-family:'Amiri',serif;font-size:15px;color:rgba(255,255,255,0.6);
line-height:1.8;text-align:right;margin-bottom:16px}
.detail-box .zikr{font-family:'Amiri',serif;font-size:17px;color:var(--neon2);
text-align:center;line-height:1.8;padding:12px;background:rgba(0,255,136,0.05);
border-radius:12px;margin-bottom:16px}
.detail-box .close{display:block;width:100%;padding:12px;background:transparent;
border:1px solid var(--neon1);border-radius:12px;color:var(--neon1);font-family:'Cairo';
font-size:14px;cursor:pointer;transition:all 0.2s}
.detail-box .close:hover{background:rgba(0,212,255,0.1)}

/* Tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(5,5,5,0.9);
backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50;padding:8px 0 12px}
.tab{flex:1;text-align:center;cursor:pointer;padding:6px;transition:all 0.2s;border:none;
background:none;color:rgba(255,255,255,0.3)}
.tab.active{color:var(--neon1)}
.tab .icon{font-size:20px;display:block;margin-bottom:2px}
.tab .label{font-size:10px;font-family:'Cairo'}

/* Counter */
.counter-badge{display:inline-block;background:var(--neon2);color:#000;font-weight:700;
font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px}

.empty{text-align:center;color:rgba(255,255,255,0.3);padding:60px 20px;font-size:14px}
.search{width:100%;padding:10px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);
border-radius:20px;color:#fff;font-family:'Cairo';font-size:13px;margin-bottom:12px;outline:none}
.search:focus{border-color:var(--neon1)}
.greeting{font-size:12px;color:var(--neon2);margin-bottom:4px}
.filter-row{display:flex;gap:6px;margin-bottom:10px;justify-content:center}
.filter-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);
background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.4);font-size:11px;cursor:pointer;transition:all 0.2s}
.filter-chip.active{background:rgba(0,212,255,0.15);border-color:var(--neon1);color:var(--neon1)}
</style>
</head>
<body>
<div id="app" class="theme-sleep">
  <div class="header">
    <div class="greeting" id="greeting"></div>
    <h1 id="appTitle">ذكر الرحمن</h1>
    <p>ما بينك وبين الله</p>
  </div>
  <div class="content" id="content"></div>
  <div class="tabs">
    <button class="tab active" data-tab="adhkar" onclick="switchTab('adhkar')">
      <span class="icon">✨</span><span class="label">أذكاري</span>
    </button>
    <button class="tab" data-tab="names" onclick="switchTab('names')">
      <span class="icon">🌟</span><span class="label">أسماء الله</span>
    </button>
    <button class="tab" data-tab="sirr" onclick="switchTab('sirr')">
      <span class="icon">🛡️</span><span class="label">سر في بئر</span>
    </button>
    <button class="tab" data-tab="settings" onclick="switchTab('settings')">
      <span class="icon">⚙️</span><span class="label">إعدادات</span>
    </button>
  </div>
</div>
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detailBox"></div>
</div>

<script>

{t:"أذكار النوم — اللهم رب السماوات السبع",c:"اللَّهُمَّ رَبَّ السَّمَاوَاتِ السَّبْعِ وَرَبَّ الْعَرْشِ الْعَظِيمِ، رَبَّنَا وَرَبَّ كُلِّ شَيْءٍ، فَالِقَ الْحَبِّ وَالنَّوَى، أَعُوذُ بِكَ مِنْ شَرِّ كُلِّ شَيْءٍ",cat:"general",target:1,ref:"رواه مسلم"},
{t:"أذكار الاستيقاظ — الحمد لله الذي أحيانا",c:"الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ",cat:"general",target:1,ref:"رواه البخاري"},
{t:"أذكار الاستيقاظ — لا إله إلا الله وحده",c:"لاَ إِلَـهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، سُبْحَانَ اللَّهِ، الْحَمْدُ لِلَّهِ، لاَ إِلَـهَ إِلاَّ اللَّهُ، اللَّهُ أَكْبَرُ، وَلاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللَّهِ",cat:"general",target:1,ref:"رواه البخاري"},
{t:"سبحان الله العظيم وبحمده",c:"سُبْحَانَ اللَّهِ الْعَظِيمِ وَبِحَمْدِهِ",cat:"general",target:100,ref:"رواه مسلم"},
{t:"الله أكبر",c:"اللَّهُ أَكْبَرُ",cat:"general",target:100,ref:"رواه مسلم"},
{t:"لا إله إلا الله",c:"لاَ إِلَـهَ إِلاَّ اللَّهُ",cat:"general",target:100,ref:"رواه مسلم"},
{t:"اللهم إني أسألك الجنة",c:"اللَّهُمَّ إِنِّي أَسْأَلُكَ الْجَنَّةَ وَأَعُوذُ بِكَ مِنَ النَّارِ",cat:"general",target:3,ref:"رواه أبو داود"},
{t:"اللهم إني أعوذ بك من شر نفسي",c:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ",cat:"general",target:1,ref:"رواه مسلم"},
{t:"اللهم صل وسلم وبارك على محمد",c:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى نَبِيِّنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ أَجْمَعِينَ",cat:"general",target:100,ref:"رواه مسلم"},
{t:"رضيت بالله ربا",c:"رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا، وَبِمُحَمَّدٍ نَبِيًّا",cat:"morning",target:3,ref:"رواه أبو داود"},
{t:"أصبحنا على فطرة الإسلام",c:"أَصْبَحْنَا عَلَى فِطْرَةِ الإِسْلاَمِ، وَعَلَى كَلِمَةِ الإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ",cat:"morning",target:1,ref:"رواه أحمد"},
{t:"اللهم ما أصبح بي من نعمة",c:"اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لاَ شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ",cat:"morning",target:1,ref:"رواه أبو داود"},
{t:"اللهم إني أصبحت أشهدك",c:"اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ وَمَلاَئِكَتَكَ وَجَمِيعَ خَلْقِكَ أَنَّكَ أَنْتَ اللَّهُ لاَ إِلَـهَ إِلاَّ أَنْتَ وَحْدَكَ لاَ شَرِيكَ لَكَ",cat:"morning",target:4,ref:"رواه أبو داود"},
{t:"الحمد لله الذي أطعمنا",c:"الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنَا وَسَقَانَا، وَكَفَانَا وَآوَانَا، فَكَمْ مِمَّنْ لاَ كَافِيَ لَهُ وَلاَ مُؤْوِيَ",cat:"general",target:1,ref:"رواه مسلم"},

// ============================================================================
//  State
// ============================================================================
var currentTab='adhkar';
var counts={};
var filterCat='all';

function getTheme(){var h=new Date().getHours();if(h>=5&&h<17)return'morning';if(h>=17&&h<21)return'evening';return'sleep';}
function getGreeting(){var h=new Date().getHours();if(h>=5&&h<12)return'صباح الخير ✨';if(h>=12&&h<17)return'مساء النور 🌟';if(h>=17&&h<21)return'مساء الطمأنينة 🌙';return'ليلة سعيدة 🌙';}

function applyTheme(){
var t=getTheme();
var app=document.getElementById('app');
app.className='theme-'+t;
var titles={morning:'☀️ ذكر الصباح',evening:'🌆 ذكر المساء',sleep:'🌙 ذكر الليل'};
document.getElementById('appTitle').textContent=titles[t];
document.getElementById('greeting').textContent=getGreeting();
}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
render();
}

function render(){
var c=document.getElementById('content');
if(currentTab==='adhkar')renderAdhkar(c);
else if(currentTab==='names')renderNames(c);
else if(currentTab==='sirr')renderSirr(c);
else if(currentTab==='settings')renderSettings(c);
}

function renderAdhkar(c){
var cats=[{k:'all',l:'الكل'},{k:'morning',l:'صباح'},{k:'evening',l:'مساء'},{k:'general',l:'عام'}];
var html='<div class="filter-row">';
cats.forEach(function(cat){
html+='<button class="filter-chip '+(filterCat===cat.k?'active':'')+'" onclick="setFilter(\''+cat.k+'\')">'+cat.l+'</button>';
});
html+='</div>';
var list=ADHKAR.filter(function(a){return filterCat==='all'||a.cat===filterCat});
if(list.length===0){html+='<div class="empty">لا توجد أذكار</div>';c.innerHTML=html;return;}
list.forEach(function(a,i){
var id='z'+i;
var cur=counts[id]||0;
var pct=Math.min(100,(cur/a.target)*100);
html+='<div class="card" onclick="increment(\''+id+'\','+i+')">';
html+='<h3>'+a.t+'</h3>';
html+='<p>'+a.c+'</p>';
html+='<div class="count"><div class="bar"><div class="bar-fill" style="width:'+pct+'%"></div></div>';
html+='<span class="num">'+cur+' / '+a.target+'</span></div>';
if(a.ref)html+='<div class="ref">'+a.ref+'</div>';
html+='</div>';
});
c.innerHTML=html;
}

function setFilter(cat){filterCat=cat;render();}

function increment(id,i){
counts[id]=(counts[id]||0)+1;
if(counts[id]>ADHKAR[i].target)counts[id]=ADHKAR[i].target;
renderAdhkar(document.getElementById('content'));
}

function renderNames(c){
var html='<input class="search" type="text" placeholder="ابحث في الأسماء..." oninput="searchNames(this.value)">';
html+='<div class="names-grid" id="namesGrid">';
NAMES.forEach(function(n,i){
html+='<div class="name-card" onclick="showDetail('+i+')">';
html+='<div class="name" style="color:'+n.c+';text-shadow:0 0 8px '+n.c+'">'+n.n+'</div>';
html+='<div class="meaning">'+n.m+'</div></div>';
});
html+='</div>';
c.innerHTML=html;
}

function searchNames(val){
var grid=document.getElementById('namesGrid');
if(!grid)return;
var html='';
NAMES.forEach(function(n,i){
if(n.n.includes(val)||n.m.includes(val)){
html+='<div class="name-card" onclick="showDetail('+i+')">';
html+='<div class="name" style="color:'+n.c+';text-shadow:0 0 8px '+n.c+'">'+n.n+'</div>';
html+='<div class="meaning">'+n.m+'</div></div>';
}
});
grid.innerHTML=html||'<div class="empty">لا نتائج</div>';
}

function showDetail(i){
var n=NAMES[i];
var box=document.getElementById('detailBox');
box.innerHTML='<div class="big-name" style="color:'+n.c+';text-shadow:0 0 20px '+n.c+'">'+n.n+'</div>'+
'<div class="meaning">'+n.m+'</div>'+
'<div class="desc">'+n.d+'</div>'+
'<div class="zikr">'+n.z+'</div>'+
'<button class="close" onclick="closeDetail()">رجوع</button>';
document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail(e){
if(e&&e.target.id!=='detailOverlay'&&e.tagName!=='BUTTON')return;
document.getElementById('detailOverlay').classList.remove('active');
}

var sirrUnlocked=false;
var sirrPin='';

function getNotes(){try{return JSON.parse(localStorage.getItem('sirr_notes')||'[]')}catch(e){return[]}}
function saveNotes(n){localStorage.setItem('sirr_notes',JSON.stringify(n))}
function getPinHash(){return localStorage.getItem('sirr_pin')||''}
function setPinHash(h){localStorage.setItem('sirr_pin',h)}

function simpleHash(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h}return 'h'+Math.abs(h)}

function renderSirr(c){
if(getPinHash()===''){
c.innerHTML='<div class="empty">🛡️ سر في بئر</div>'+
'<div class="card" style="margin-top:20px"><h3>تعيين PIN للمرة الأولى</h3>'+
'<p style="margin-bottom:10px">أدخل رمز PIN (٤ أرقام) لحماية ملاحظاتك:</p>'+
'<input type="password" id="pinInput" maxlength="6" placeholder="••••" style="width:100%;padding:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:20px;text-align:center;letter-spacing:8px;margin-bottom:10px">'+
'<button class="close" onclick="setupPin()">حفظ PIN</button></div>';
return;
}
if(!sirrUnlocked){
c.innerHTML='<div class="empty">🛡️ سر في بئر</div>'+
'<div class="card" style="margin-top:20px"><h3>أدخل PIN</h3>'+
'<p style="margin-bottom:10px">ما بينك وبين الله...</p>'+
'<input type="password" id="pinInput" maxlength="6" placeholder="••••" style="width:100%;padding:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:20px;text-align:center;letter-spacing:8px;margin-bottom:10px">'+
'<button class="close" onclick="tryUnlock()">🔓 فتح</button></div>';
return;
}
var notes=getNotes();
var html='<div class="card" style="display:flex;justify-content:space-between;align-items:center">'+
'<h3 style="margin:0">🔒 ملاحظاتي السرية</h3>'+
'<button onclick="addNote()" style="background:var(--neon2);color:#000;border:none;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:Cairo">+ جديد</button></div>';
if(notes.length===0){
html+='<div class="empty">لا توجد ملاحظات بعد<br><small>اضغط + جديد لإضافة سر</small></div>';
}else{
notes.forEach(function(n,i){
html+='<div class="card" onclick="editNote('+i+')"><h3>'+n.title+'</h3>'+
'<p style="font-size:11px;color:rgba(255,255,255,0.3)">'+n.date+'</p></div>';
});
}
html+='<button onclick="lockSirr()" style="display:block;width:100%;margin-top:10px;padding:10px;background:transparent;border:1px solid #FF0040;border-radius:12px;color:#FF0040;cursor:pointer;font-family:Cairo">🔒 قفل</button>';
c.innerHTML=html;
}

function setupPin(){
var v=document.getElementById('pinInput').value;
if(v.length<4){alert('PIN يجب أن يكون ٤ أرقام على الأقل');return;}
setPinHash(simpleHash(v));
sirrUnlocked=true;
renderSirr(document.getElementById('content'));
}

function tryUnlock(){
var v=document.getElementById('pinInput').value;
if(simpleHash(v)===getPinHash()){sirrUnlocked=true;renderSirr(document.getElementById('content'))}
else{alert('PIN غير صحيح')}
}

function lockSirr(){sirrUnlocked=false;renderSirr(document.getElementById('content'))}

function addNote(){editNote(-1)}

function editNote(i){
var notes=getNotes();
var n=i>=0?notes[i]:{title:'',content:'',date:new Date().toLocaleDateString('ar-EG')};
var c=document.getElementById('content');
c.innerHTML='<div class="card"><h3>'+(i>=0?'تعديل السر':'سر جديد')+'</h3>'+
'<input type="text" id="noteTitle" value="'+n.title.replace(/"/g,'&quot;')+'" placeholder="عنوان مختصر..." style="width:100%;padding:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:Cairo;font-size:14px;margin-bottom:10px">'+
'<textarea id="noteContent" placeholder="اكتب ما لا يعلمه إلا الله..." style="width:100%;min-height:200px;padding:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:Amiri;font-size:15px;line-height:1.8;margin-bottom:10px;resize:vertical">'+n.content+'</textarea>'+
'<div style="display:flex;gap:8px"><button onclick="saveNote('+i+')" style="flex:1;padding:12px;background:rgba(0,212,255,0.1);border:1px solid var(--neon1);border-radius:12px;color:var(--neon1);cursor:pointer;font-family:Cairo">🔒 حفظ مشفر</button>'+
'<button onclick="renderSirr(document.getElementById(\'content\'))" style="padding:12px 20px;background:transparent;border:1px solid var(--border);border-radius:12px;color:rgba(255,255,255,0.4);cursor:pointer;font-family:Cairo">إلغاء</button></div></div>';
if(i>=0){
c.innerHTML+='<button onclick="deleteNote('+i+')" style="display:block;width:100%;margin-top:8px;padding:10px;background:transparent;border:1px solid #FF0040;border-radius:12px;color:#FF0040;cursor:pointer;font-family:Cairo">🗑️ حذف نهائي</button>';
}
}

function saveNote(i){
var t=document.getElementById('noteTitle').value.trim();
var ct=document.getElementById('noteContent').value;
if(!t){alert('اكتب عنواناً أولاً');return;}
var notes=getNotes();
var note={title:t,content:ct,date:new Date().toLocaleDateString('ar-EG')};
if(i>=0){notes[i]=note}else{notes.unshift(note)}
saveNotes(notes);
renderSirr(document.getElementById('content'));
}

function deleteNote(i){
if(!confirm('حذف نهائي؟ لا يمكن التراجع.'))return;
var notes=getNotes();
notes.splice(i,1);
saveNotes(notes);
renderSirr(document.getElementById('content'));
}


function renderSettings(c){
var t=getTheme();
var labels={morning:'الفجر ☀️',evening:'المغرب 🌆',sleep:'الليل 🌙'};
var descs={morning:'نور وإشراق بالأزرق والأخضر النيون',evening:'دفء وسكينة بالبنفسجي والبرتقالي',sleep:'هدوء وأمان بالأحمر والذهبي'};
c.innerHTML='<div class="card"><h3>الثيم الحالي</h3><p style="font-size:20px;color:var(--neon1);text-align:center;margin:10px 0">'+labels[t]+'</p><p style="text-align:center">'+descs[t]+'</p></div>'+
'<div class="card"><h3>عن التطبيق</h3><p>Zekr Alrahman — تطبيق أذكار مخصصة مع أسماء الله الحسنى</p><p style="margin-top:8px;color:var(--neon2);font-size:11px">صُنع بحب لله. اللهم اجعله في ميزان حسناتنا 🤲</p></div>'+
'<div class="card"><h3>الإصدار</h3><p>1.0.0 — يوليو ٢٠٢٦</p></div>';
}

// Init
applyTheme();
render();
setInterval(applyTheme,60000);
</script>
